<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Exercice sans media</title>
  <desc id="desc">Visuel de remplacement pour un exercice dont la demonstration n'est pas encore disponible.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="150" fill="#22c55e" opacity="0.12"/>
  <circle cx="180" cy="700" r="220" fill="#38bdf8" opacity="0.08"/>
  <rect x="120" y="120" width="960" height="560" rx="36" fill="url(#card)" stroke="#334155" stroke-width="4"/>
  <rect x="190" y="190" width="360" height="420" rx="24" fill="#0b1220" stroke="#1e293b" stroke-width="3"/>
  <circle cx="370" cy="290" r="54" fill="#22c55e" opacity="0.9"/>
  <path d="M330 398c34-34 76-34 110 0l32 32c18 18 18 48 0 66l-58 58c-22 22-58 22-80 0l-58-58c-18-18-18-48 0-66l54-54z" fill="none" stroke="#e2e8f0" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M300 520l52-52 44 44 74-74" fill="none" stroke="#22c55e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="620" y="310" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">Demonstration a venir</text>
  <text x="620" y="392" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="30">Cet exercice est bien present dans la bibliotheque.</text>
  <text x="620" y="440" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="30">Le media n'a simplement pas encore ete ajoute.</text>
  <rect x="620" y="500" width="280" height="68" rx="34" fill="#22c55e" opacity="0.14" stroke="#22c55e"/>
  <text x="760" y="543" text-anchor="middle" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Bibliotheque STRYVLAB</text>
</svg>
